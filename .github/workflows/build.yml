name: Build and Release

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    env:
      # Opt into Node.js 24 for JavaScript-based actions (see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: iflow2api-windows-amd64.exe
            platform: windows-amd64
          - os: windows-latest
            goos: windows
            goarch: arm64
            artifact: iflow2api-windows-arm64.exe
            platform: windows-arm64
          - os: windows-latest
            goos: windows
            goarch: 386
            artifact: iflow2api-windows-386.exe
            platform: windows-386
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: iflow2api-darwin-amd64
            platform: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: iflow2api-darwin-arm64
            platform: darwin-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: iflow2api-linux-amd64
            platform: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: iflow2api-linux-arm64
            platform: linux-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: 7
            artifact: iflow2api-linux-armv7
            platform: linux-armv7
          - os: ubuntu-latest
            goos: linux
            goarch: 386
            artifact: iflow2api-linux-386
            platform: linux-386

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/iflow2api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iflow2api-${{ matrix.platform }}
          path: ${{ matrix.artifact }}

  release:
    env:
      # ensure downloads/uploads run on Node 24 too
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release tag
        id: tag
        run: |
          # use bash pattern matching against the GITHUB_REF env variable
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "release_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "title=Release ${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "release_tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "title=Testing Build dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ${{ steps.tag.outputs.title }}
          prerelease: ${{ steps.tag.outputs.is_prerelease }}
          files: artifacts/*/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
